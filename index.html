<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andrus Resource Group</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        p {
            font-size: 1.2rem;
            opacity: 0.9;
            line-height: 1.6;
        }
        .divider {
            height: 2px;
            width: 50px;
            background-color: #ff9f43;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Andrus Resource Group</h1>
        <div class="divider"></div>
        <p>Our website is currently under construction.</p>
        <p style="font-size: 1rem; opacity: 0.7;">Check back soon for updates.</p>
    </div>
</body>
</html>
