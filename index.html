<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Branching Logo Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
body {
background-color: #081703ff;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
margin: 0;
/* Safety net: scroll instead of clipping content on very short/narrow windows */
overflow: auto;
font-family: sans-serif;
}

.logo-container {
/* Shrinks on short/narrow windows so there's always room left for the branches below */
--logo-size: clamp(220px, 42vh, 400px);
--top-gap: clamp(16px, 6vh, 60px);
position: relative;
width: var(--logo-size);
height: var(--logo-size);
max-width: 100vw;
z-index: 10;
/* Smooths the shift to the top-of-page spot once activated */
transition: transform 0.8s ease;
}

/* --- THE LOGO LAYERS & PARALLAX --- */
.logo-layer {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
opacity: 0;
animation: fadeIn 0.3s ease-in-out forwards;
pointer-events: none;
/* Smooths the hover depth shift on layer-1 */
transition: transform 0.1s ease-out;
}

/* Skips the fade-in when returning from a branch page via "Return to Hub" */
body.instant .logo-layer {
animation: none;
opacity: 1;
}

@keyframes fadeIn {
0% { opacity: 0; }
100% { opacity: 1; }
}

.layer-1 {
animation-delay: 0.1s;
}
/* Layer 1 unique hover depth shift */
.logo-container:hover .layer-1 {
transform: translate(-15px, -15px);
}

.layer-2 {
animation-delay: 0.2s;
}

.layer-3 {
animation-delay: 0.3s;
}

/* --- THE BRANCHES HUB --- */
.branches {
position: absolute;
top: 50%;
left: 50%;
width: 0;
height: 0;
z-index: 1;
/* Completely locks visibility and input tracking until logo finishes fading in (0.6s total) */
animation: lockBranches 0.6s step-end forwards;
}

@keyframes lockBranches {
0% { visibility: hidden; pointer-events: none; }
100% { visibility: visible; pointer-events: auto; }
}

.branch {
position: absolute;
top: 50%;
left: 50%;
opacity: 0;
transform: translate(-50%, -50%) scale(0);

/* Cleaned color matrix to map target asset parameters perfectly */
background: #0f3d1a;
color: #fbfbe8;
padding: 12px 20px;
border-radius: 30px;
/* Playfair Display approximates the logo's high-contrast serif look */
font-family: 'Playfair Display', Georgia, serif;
font-size: 15px;
font-weight: 600;
letter-spacing: 0.03em;
text-align: center;
text-decoration: none;
width: max-content;
cursor: pointer;

/* Action mechanics - base state holds a 2-second hover out buffer delay */
transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
transition-delay: 2s;
}

.branch:hover {
background: #fbfbe8;
color: #0f3d1a;
}

/* --- ACTIVATED STATE: triggered automatically 4s after the page loads --- */
/* Pins the logo near the top of the page and turns the branch hub into a permanent row below it */
body.activated .logo-container {
/* Slides up from the vertically-centered spot to sit --top-gap from the top, whatever the window size */
transform: translateY(calc(var(--top-gap) - 50vh + (var(--logo-size) / 2)));
}

body.activated .branches {
position: absolute;
top: 100%;
left: 50%;
transform: translate(-50%, clamp(12px, 3vh, 40px));
/* Natural row width, but never wider than the viewport, so flex-wrap kicks in on narrow windows */
width: max-content;
max-width: 92vw;
height: auto;
display: flex;
flex-wrap: wrap;
justify-content: center;
gap: 16px;
animation: none;
}

body.activated .branch {
position: static !important;
opacity: 1 !important;
transform: none !important;
transition-delay: 0s !important;
}

</style>
</head>
<body>

<div class="logo-container">

<div class="branches">
<div class="branch" style="--angle: 0deg;" onclick="openGreenScreen('Oil Change Services')">Oil Change Services</div>
<div class="branch" style="--angle: 90deg;" onclick="openGreenScreen('Custom Fine Arts')">Custom Fine Arts</div>
<div class="branch" style="--angle: 135deg;" onclick="openGreenScreen('Music Production')">Music Production</div>
<div class="branch" style="--angle: 180deg;" onclick="openGreenScreen('Software Development')">Software Development</div>
</div>

<script>
// Skip the 4s wait when coming back from a branch page via "Return to Hub"
if (sessionStorage.getItem('skipHubDelay')) {
sessionStorage.removeItem('skipHubDelay');
document.body.classList.add('activated', 'instant');
} else {
// 4s after load, pin the logo to the top and reveal the branches permanently below it
setTimeout(() => {
document.body.classList.add('activated');
}, 2000);
}

// Updated screen generator to match off-white logo colors instead of gold
function openGreenScreen(title) {
document.body.innerHTML = `
<div style="color: #fbfbe8; text-align: center; margin-top: 20vh;">
<h1 style="font-size: 3rem;">${title}</h1>
<p style="font-size: 1.2rem; max-width: 600px; margin: 0 auto; line-height: 1.6; color: #fbfbe8;">
Under construction. Please return later.
</p>
<button onclick="sessionStorage.setItem('skipHubDelay', '1'); location.reload();" style="padding: 12px 24px; margin-top: 30px; background: #fbfbe8; color: #0f3d1a; border: none; cursor: pointer; border-radius: 30px; font-size: 1rem; font-weight: bold;">Return to Hub</button>
</div>
`;
}
</script>
